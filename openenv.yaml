id="final_yaml_fix"
name: expense-categorization-env
description: >
  A real-world OpenEnv environment where an AI agent categorizes financial
  transactions into predefined expense categories such as Food, Transport,
  Bills, Shopping, and Other.

version: 1.0

entrypoint: env.environment:ExpenseEnv

tasks:
  - name: easy
    description: Clear and unambiguous transactions
  - name: medium
    description: Moderately ambiguous transactions requiring context
  - name: hard
    description: Highly ambiguous transactions requiring reasoning

observation_space:
  transaction:
    type: string
    description: Description of the transaction
  amount:
    type: float
    description: Transaction amount
  step:
    type: integer
    description: Current step in the episode

action_space:
  category:
    type: string
    description: One of [Food, Transport, Bills, Shopping, Other]

reward:
  type: float
  range: [-1.0, 1.0]
  description: >
    Reward is +1.0 for correct classification,
    +0.5 for partially correct classification,
    and -1.0 for incorrect classification.
